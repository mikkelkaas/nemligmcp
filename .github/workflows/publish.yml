name: Release

# Conventional-commits release. On every push to master, semantic-release reads
# the commits since the last release, decides the next version (fix: -> patch,
# feat: -> minor, BREAKING CHANGE -> major), updates the changelog + package.json,
# tags, creates a GitHub Release, and publishes to npm (with provenance).
# Commits without a release-worthy type are a no-op.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write # create tags/releases and commit the version + changelog back
  issues: write
  pull-requests: write
  id-token: write # OIDC: npm Trusted Publishing + provenance (no NPM_TOKEN needed)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full history + tags
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # semantic-release v25 requires Node >=22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # Publishes via npm Trusted Publishing (OIDC) — semantic-release exchanges
      # the GitHub OIDC token for a short-lived npm token, so no NPM_TOKEN secret
      # is needed. Provenance is attached automatically.
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: npx semantic-release
